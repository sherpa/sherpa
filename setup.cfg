[sherpa_config]

# Directory where the external dependencies must be installed.
#install_dir=build

# Additional configure flags for building extern dependencies
# Set to 'None' (without quotes) to just override the default flags
#configure=None

# GROUP Python module
#disable_group=True
#group_location=build/lib/python2.7/site-packages/group.so

# Additional flags to be passed to libgrp build
#group_cflags=

# File Stack Python module
#disable_stk=True
#stk_location=build/lib/python2.7/site-packages/stk.so

# FFTW Library
# Uncomment to use a local installation
#fftw=local

# If fftw=local uncomment the following lines and
# change the default location of libraries and the name
# of the library to be linked (usually fftw3)
# (include multiple values by separating them with spaces)
#fftw_include_dirs=build/include
#fftw_lib_dirs=build/lib
#fftw_libraries=fftw3

# Region Library
#disable_region=True
# Uncomment to use a local installation
#region=local

# If region=local uncomment the following lines and
# change the default location of libraries and headers and the name
# of the library to be linked (usually region)
# (include multiple values by separating them with spaces)
#region_include_dirs=build/include
#region_lib_dirs=build/lib
#region_libraries=region
#
# Should the CXC Data Model parser be used? This enables FITS region
# files but requires the CXC Data Model code is available. If set
# then ascdm should be added to region_libraries and ensure
# that ascdm.h/ascdm.so are added to the region_include_dirs
# and region_lib_dirs directories.
#region_use_cxc_parser=False

# WCS Subroutines
#disable_wcs=True
# Uncomment to use a local installation
#wcs=local

# Uncomment and change default location if needed
#wcs_include_dirs=build/include
#wcs_lib_dirs=build/lib
#wcs_libraries=wcs


[build_sphinx]
source-dir = docs


# XSPEC Models
[xspec_config]
# The minimal settings needed are
#
#   with_xspec = True
#   xspec_version = <XSPEC version, the patch level is not needed>
#   xspec_lib_dirs = <path>
#   xspec_include_dirs = <path>
#
# The xspec_libraries line may be needed, depending on how XSPEC is
# built. When given the version of the hdsp library should be updated
# (e.g. change hdsp_6.36 to match the installation).
#
# The cfitsio_libraries, ccfits_libraries, and wcslib_libraries may
# need to be set, depending on how XSPEC is built. It is likely that
# the ccfits_libraries and wcslib_libraries names will need to include
# the version (e.g. CCfits_2.7 and wcs.8.3). The corresponsing
# lib_dirs settings will only need to be set if they are not in the
# xspec_lib_dirs path.
#
# The gfortran_lib_dirs should be set if needed.
#
#with_xspec=True
#xspec_version = 12.15.1
#xspec_lib_dirs = None
#xspec_include_dirs = None
#xspec_libraries = XSFunctions XSUtil XS hdsp_6.36
#cfitsio_lib_dirs = None
#cfitsio_libraries = cfitsio
#ccfits_lib_dirs = None
#ccfits_libraries = CCfits_2.7
#wcslib_lib_dirs = None
#wcslib_libraries = wcs.8.3
#gfortran_lib_dirs = None
#gfortran_libraries = gfortran
